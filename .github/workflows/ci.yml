name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master, development]

# ─────────────────────────────────────────────────────────────────────────────
# NOTE FOR TEMPLATE USERS
#
# This workflow is for maintaining the express-ts-starter template itself.
# When you initialize a project from this template (node scripts/init.js),
# update this file for your project's needs:
#
#   - Uncomment or restore the "db-migrate" job once you have migration files
#   - Uncomment or restore the "integration-test" job with your env secrets
#   - Remove this comment block
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  ci:
    name: Lint → Typecheck → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Generate Prisma client so TypeScript can resolve generated types.
      # (generated/ is gitignored — must be regenerated in CI)
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      # Validates schema.prisma syntax without a database connection.
      - name: Prisma schema validation
        run: npx prisma validate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to upload SARIF to GitHub Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Scan the repository filesystem for known CVEs in npm dependencies.
      # ignore-unfixed: only fail on CVEs that have a fix available (actionable).
      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          limit-severities-for-sarif: true
          exit-code: 1

      - name: Upload filesystem SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # Build the Docker image and scan for OS-level vulnerabilities.
      # if: always() ensures this runs even if the fs scan found CVEs above.
      - name: Build Docker image for scanning
        if: always()
        run: docker build -t app:${{ github.sha }} .

      - name: Trivy — Docker image scan
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: app:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          limit-severities-for-sarif: true
          exit-code: 1

      - name: Upload image scan SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
