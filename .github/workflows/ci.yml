name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master, development]

jobs:
  ci:
    name: Lint → Typecheck → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      # Validates schema.prisma syntax without a database connection.
      - name: Prisma schema validation
        run: npx prisma validate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  db-migrate:
    name: DB Migration Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Apply all migration files to a fresh database.
      # Fails if any migration file is invalid SQL or conflicts with the schema.
      - name: Apply migrations
        run: npx prisma migrate deploy

      # Verify there are no unapplied or failed migrations after deploy.
      - name: Check migration status
        run: npx prisma migrate status

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
      TEST_REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Run integration tests
        run: npm run test:integration

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to upload SARIF to GitHub Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Scan the repository filesystem for known CVEs in npm dependencies and source.
      # Fails the job on HIGH or CRITICAL severity findings.
      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: 1

      - name: Upload filesystem SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() # upload even if the scan step failed
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # Build the Docker image and scan it for OS-level and package vulnerabilities.
      # Runs after the filesystem scan so we don't waste build time if deps are already failing.
      - name: Build Docker image for scanning
        run: docker build -t app:${{ github.sha }} .

      - name: Trivy — Docker image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: app:${{ github.sha }}
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image.sarif
          exit-code: 1

      - name: Upload image scan SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
