name: Smoke Test

# Manual trigger only on the template maintenance repo.
# NOTE FOR TEMPLATE USERS: restore the schedule once you have migration files
# and a working initialized project, e.g.:
#   schedule:
#     - cron: "17 2 * * 0"   # Every Sunday at 02:17 UTC
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Server base URL to test against"
        required: false
        default: "http://localhost:3001"

jobs:
  smoke-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # App runtime env vars
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_smoke
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-for-smoke-testing-32chars!
      SESSION_SECRET: ci-session-secret-for-smoke-testing-32c!
      CSRF_SECRET: ci-csrf-secret-for-smoke-testing-32chars!
      FRONTEND_URL: http://localhost:3001
      CORS_ORIGINS: http://localhost:3001
      EMAIL_HOST: localhost
      EMAIL_PORT: 1025
      EMAIL_SECURE: "false"
      EMAIL_USER: test@ci.local
      EMAIL_PASSWORD: test
      EMAIL_FROM: test@ci.local
      # k6 test credentials (must match the seeded user below)
      K6_TEST_EMAIL: admin@example.com
      K6_TEST_PASSWORD: SuperAdmin@123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database (creates admin@example.com test user)
        run: npx ts-node prisma/seed.ts

      - name: Build
        run: npm run build

      - name: Start server
        run: node dist/src/app.js &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on :$PORT..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${PORT}/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start within 30s"
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run smoke test
        run: |
          k6 run \
            --env BASE_URL=http://localhost:${PORT} \
            --env TEST_EMAIL=${K6_TEST_EMAIL} \
            --env TEST_PASSWORD=${K6_TEST_PASSWORD} \
            k6/smoke.js
